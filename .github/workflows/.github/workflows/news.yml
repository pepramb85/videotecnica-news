name: Aggiorna news feed

on:
  schedule:
    # Ogni 2 ore (UTC)
    - cron: '0 */2 * * *'
  workflow_dispatch:  # permette esecuzione manuale dal pulsante "Run workflow"
  push:
    branches: [main]
    paths:
      - 'fetch_news.py'
      - '.github/workflows/news.yml'

permissions:
  contents: write

jobs:
  update-news:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installa dipendenze
        run: pip install feedparser

      - name: Esegui fetch_news.py
        run: python fetch_news.py

      - name: Commit e push se ci sono cambiamenti
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add news.json
          if git diff --staged --quiet; then
            echo "Nessuna modifica al file news.json, niente da committare."
          else
            git commit -m "Aggiornamento news feed [skip ci]"
            git push
          fi
